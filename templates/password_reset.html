{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-16 animate-pulse-slow">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border-2 border-dashed border-blue-200 dark:border-blue-900/50">
        
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-red-50 dark:bg-red-900/20 rounded-full mb-4">
                <span class="text-2xl">🔑</span>
            </div>
            <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tighter italic uppercase">RECOVER_ACCESS</h2>
            <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-2 font-mono">NODE_PASSWORD_OVERRIDE_PROTOCOL</p>
        </div>

        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-3 rounded-xl text-xs font-bold {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div class="flex flex-col">
                <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-widest ml-1">Target Username</label>
                <input type="text" name="username" 
                       placeholder="Enter Registered Username..." 
                       class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-red-500 outline-none transition-all text-sm font-mono" 
                       required>
            </div>

            <div class="flex flex-col">
                <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-widest ml-1">New Secure Key</label>
                <input type="password" name="new_password" 
                       placeholder="Enter New Password..." 
                       class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-green-500 outline-none transition-all text-sm font-mono" 
                       required>
            </div>

            <button type="submit" class="w-full bg-slate-900 dark:bg-blue-600 hover:bg-black dark:hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg uppercase text-xs tracking-[0.2em] active:scale-95 mt-4">
                RESET_DATABASE_KEY
            </button>
        </form>

        <div class="mt-8 pt-6 border-t dark:border-slate-700 text-center">
            <a href="{% url 'login' %}" class="text-xs text-blue-600 dark:text-blue-400 font-bold hover:underline">
                ← ABORT & RETURN TO LOGIN
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes pulse-slow {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.01); }
    }
    .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
</style>
{% endblock %}
